<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chessground Remote Board</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chessground@8.3.10/assets/chessground.base.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chessground@8.3.10/assets/chessground.brown.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chessground@8.3.10/assets/chessground.cburnett.css">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="layout">

    <!-- LEFT MENU -->
    <div class="menu">

      <h2>Menu</h2>

      <div class="menu-section">

        <h3>Board Controls</h3>

        <div class="menu-controls">

          <label class="control">
            <input type="checkbox" id="toggle-engine">
            <span>Engine</span>
          </label>

          <div class="control">
            <button class="control-btn" id="flip-board-btn"></button>
            <span>Flip Board</span>
          </div>

        </div>

      </div>

      <hr>

      <div class="menu-section">
        <h3>New Game</h3>

        <label>
          Clock Time
          <select id="clock-select">
            <option value="0">No Clock</option>
            <option value="60">1 min</option>
            <option value="180">3 min</option>
            <option value="300">5 min</option>
            <option value="600">10 min</option>
          </select>
        </label>

        <label>
          Color
          <select id="color-select">
            <option value="white">White</option>
            <option value="black">Black</option>
            <option value="random">Random</option>
          </select>
        </label>

        <button class="button-newgame" id="new-game-btn">Start New Game</button>
      </div>

    </div>

    <!-- BOARD AREA -->
    <div class="board-area">

      <h1>Chessground Remote Board</h1>

      <p class="status" id="status">Connecting…</p>

      <div class="board-container">

        <!-- BOARD + CLOCKS + EVAL BAR -->
        <div class="board-column">

          <!-- OPPONENT CLOCK -->
          <div class="clock clock-top">
            <span id="clock-black">--:--</span>
          </div>

          <!-- BOARD ROW -->
          <div class="board-row">

            <div class="eval-bar" id="eval-bar">
              <div class="eval-fill" id="eval-fill"></div>
            </div>

            <div class="board-wrap" id="board"></div>

          </div>

          <!-- PLAYER CLOCK -->
          <div class="clock clock-bottom">
            <span id="clock-white">--:--</span>
          </div>

          <!-- FEN DISPLAY -->
          <div class="fen-panel">
            <div class="fen-label">FEN</div>
            <div class="fen-value" id="fen-display">
              rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR
            </div>
          </div>

        </div>

      </div>

    </div>

    <!-- ENGINE PANEL -->
    <div class="engine-panel">

      <div class="engine-output">
        <h3>Engine</h3>

        <div class="engine-info">
          <div>Depth: <span id="engine-depth">-</span></div>
          <div>Eval: <span id="engine-eval">-</span></div>
          <div>Best Move: <span id="engine-bestmove">-</span></div>
        </div>

        <div class="engine-pv" id="engine-pv">
          Waiting for engine...
        </div>
      </div>

      <div class="hint-panel">
        <h3>Hints</h3>
        <div id="hint-text">
          Engine hints will appear here.
        </div>
      </div>

    </div>

  </div>

  <script type="importmap">
  {
    "imports": {
      "chessground": "https://cdn.jsdelivr.net/npm/chessground@8.3.10/chessground.js"
    }
  }
  </script>
  <script type="module">
    import { Chessground } from 'chessground';

    // Get references to DOM elements
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');

    const fenDisplay = document.getElementById('fen-display');

    const evalFill = document.getElementById('eval-fill');

    const engineDepthEl = document.getElementById('engine-depth');
    const engineEvalEl = document.getElementById('engine-eval');
    const engineBestMoveEl = document.getElementById('engine-bestmove');
    const enginePvEl = document.getElementById('engine-pv');

    const whiteClockEl = document.getElementById('clock-white');
    const blackClockEl = document.getElementById('clock-black');

    const colorSelect = document.getElementById("color-select");
    const newGameBtn = document.getElementById("new-game-btn");
    const clockSelect = document.getElementById("clock-select");


    // Retain states
    let lastBoardStatus = null;

    let clockStatus = {
      on: false,
      started: false,
      clockExpired: false,

      whiteMs: 0,
      blackMs: 0,

      running: null,        // "white" | "black" | null
      lastServerTime: 0,    // timestamp from server
      lastLocalTime: 0      // performance.now()
    };


    // Helper function to update the status text based on game state
    function updateStatusText(status) {
      // If no status is provided, show a generic connected message
      if (!status) {
        statusEl.textContent = 'Connected. Waiting for game state…';
        return;
      }
      // Check for clock expiration first to prioritize that status
      if (clockStatus.clockExpired) {
        const winner = clockStatus.running === "white" ? "Black" : "White";
        statusEl.textContent = `Time out — ${winner} wins!`;
        return;
      }
      // Construct status text based on turn, check, checkmate, and draw conditions
      let text = `Turn: ${status.turn}.`;
      if (status.isCheckmate) text = `Checkmate + ${status.turn === 'white' ? 'Black' : 'White'} wins!`;
      else if (status.isDraw) text = ' Draw.';
      else if (status.inCheck) text += ' Check.';
      statusEl.textContent = text;
    }

    // create a new Chessground instance with the given container and color orientation
    function createBoard(container, color = 'white') {
      ground = Chessground(container, {
        coordinates: true,
        orientation: color,
        animation: { duration: 200 },
        movable: {
          free: false,
          dests: new Map(),
          color: color,
          events: { after: onUserMove },
        },
      });
    }


    // Initialize Chessground with basic configuration
    let ground = null;
    createBoard(boardEl);

    // Define move event handlers for user interactions on the board
    const movableEvents = { after: onUserMove };

    // Function to apply a new game status to the board
    function applyStatus(status) {
      // Avoid re-applying the same status to prevent unnecessary updates and potential animation glitches
      if (
        lastBoardStatus &&
        lastBoardStatus.fen === status.fen &&
        lastBoardStatus.turn === status.turn
      ) {
        return;
      }

      // Log the status being applied for debugging purposes
      console.log("APPLY STATUS", {
        fen: status.fen,
        turn: status.turn,
        destCount: Object.keys(status.dests || {}).length
      })

      lastBoardStatus = status;

      const destEntries = Object.entries(status.dests || {});
      const destsMap = new Map(destEntries.map(([from, tos]) => [from, tos]));

      // clear any square selection first
      ground.set({ selected: undefined });

      // Update the board position and legal moves based on the new status
      ground.set({
        fen: status.fen,
        movable: {
          dests: destsMap,
          color: status.turn,
          movableEvents
        }
      });

      // Update status text
      updateStatusText(status);

      // Update FEN display
      if (fenDisplay) fenDisplay.textContent = status.fen;
    }

    // Handler for user moves on the board
    async function onUserMove(orig, dest) {
      // Log the attempted move for debugging purposes
      console.log("USER MOVE", { from: orig, to: dest, fen: lastBoardStatus?.fen });

      const previousStatus = lastBoardStatus;

      try {
        const res = await fetch('/api/board/move', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ from: orig, to: dest }),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          // Log the error response for debugging purposes
          console.log("MOVE REJECTED", data)

          // Revert the move if illegal or game is over
          if (previousStatus) {
            ground.set({ fen: previousStatus.fen });
            applyStatus(previousStatus);
          }
          statusEl.textContent = data.error || 'Move rejected by server.';
          return;
        }
      } catch (err) {
        if (previousStatus) {
          ground.set({ fen: previousStatus.fen });
          applyStatus(previousStatus);
        }
        statusEl.textContent = 'Network error, move reverted.';
      }

      if (clockStatus.on) {

        if (!clockStatus.started) {
          clockStatus.started = true;

          const res = await fetch('/api/clock/start', {
            method: 'POST'
          });

          const data = await res.json();

          await syncClockState();

          // Log the attempted clock start for debugging purposes
          console.log("CLOCK START", data);
        }

        const res = await fetch('/api/clock/switch-turn', {
          method: 'POST'
        });


        // Switch turn on the clock after a move is made
        const data = await res.json();

        await syncClockState();

        // Log the attempted clock switch for debugging purposes
        console.log("CLOCK SWITCH", data);
      }
    }

    // Load the initial game state from the server when the page loads
    async function loadInitialState() {
      try {
        const res = await fetch('/api/board/state');
        const data = await res.json();
        if (data && data.status) {
          applyStatus(data.status);
        }
      } catch (err) {
        console.warn('Failed to load initial state', err);
      }
    }

    // Function to update the evaluation bar based on centipawn score
    function updateEvalBar(cp) {

      const MAX_CP = 1000

      cp = Math.max(-MAX_CP, Math.min(MAX_CP, cp))

      const pct = 50 + (cp / MAX_CP) * 50

      evalFill.style.height = pct + "%"
      evalFill.style.bottom = "0"

    }

    // Function to draw an arrow on the board indicating the engine's best move
    function drawBestMoveArrow(move) {

      if (!move || move.length < 4) return

      const from = move.slice(0,2)
      const to = move.slice(2,4)

      ground.set({
        drawable: {
          visible: true,
          autoShapes: [{
            orig: from,
            dest: to,
            brush: 'green'
          }]
        }
      })
    }

    // Establish a connection to the server for real-time updates
    function connect() {
      const ev = new EventSource('/api/general/stream');
      ev.onopen = () => {
        statusEl.textContent = 'Connected. Use the local HTTP API to control the board (see terminal for examples).';
      };
      ev.onerror = () => {
        statusEl.textContent = 'Connection lost. Reconnecting in 3 seconds…';
        ev.close();
        setTimeout(connect, 3000);
      };
      ev.onmessage = (e) => {
        try {
          // Handle incoming commands from the server

          // ==== BOARD CONTROL COMMANDS ====
          const cmd = JSON.parse(e.data);
          if (cmd.type === 'setFen') {
            // Log the status for debugging purposes
            console.log("SSE STATUS", {
              fen: cmd.status.fen,
              turn: cmd.status.turn,
              dests: Object.keys(cmd.status.dests || {})
            })

            // Update the board with the new status from the server
            applyStatus(cmd.status);
          } 
          else if (cmd.type === 'select') {

            // Handle square selection command (e.g., for move hints)
            ground.selectSquare(cmd.key);
          } 
          else if (cmd.type === 'flip') {

            // Handle board flip command
            ground.toggleOrientation();
          }
          
          // ==== ENGINE UPDATE COMMANDS ====
          else if (cmd.type === 'engineUpdate') {

            const lines = cmd.lines
            if (!lines || !lines.length) return

            const best = lines[0]

            let cp = best.eval_cp
            let displayEval = "-"

            // Mate handling
            if (best.mate_in != null) {
                const sign = best.mate_in > 0 ? "" : "-"  // positive: White mates, negative: Black mates
                displayEval = `${sign}#${Math.abs(best.mate_in)}`
                if (best.mate_in == 0) return; // avoid eval bar jumps 
                cp = best.mate_in > 0 ? 10000 : -10000
            } else if (cp != null) {
                displayEval = (cp / 100).toFixed(2)
            }

            engineEvalEl.textContent = displayEval
            updateEvalBar(cp || 0)

            // Depth
            engineDepthEl.textContent = best.depth != null ? best.depth : "-"

            // PV moves and best move arrow
            engineBestMoveEl.textContent = best.pv && best.pv.length ? best.pv[0] : "-"
            enginePvEl.textContent = best.pv && best.pv.length ? best.pv.join(' ') : "-"
            if (best.pv && best.pv.length) drawBestMoveArrow(best.pv[0])
          }
          else if (cmd.type === 'engineBestMove') {
            const move = cmd.move
            engineBestMoveEl.textContent = move
            drawBestMoveArrow(move)
          }
          else if (cmd.type === 'engineStop') {
            ground.set({
              drawable: {
                autoShapes: []
              }
            })
          }
        } catch (err) {
          console.warn('Unknown command', e.data, err);
        }
      };
    }

    const engineToggle = document.getElementById("toggle-engine")
    const evalBar = document.getElementById("eval-bar")

    // Handler for toggling the engine on and off
    engineToggle.addEventListener("change", async () => {
      if (engineToggle.checked) {
        evalBar.classList.remove("hidden")
        enginePvEl.textContent = "Analyzing..."
        engineEvalEl.textContent = "-"
        engineBestMoveEl.textContent = "-"
        engineDepthEl.textContent = "-"

        await fetch('/api/engine/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fen: lastBoardStatus.fen })
        })

      } else {
        evalBar.classList.add("hidden")
        enginePvEl.textContent = "-"
        engineEvalEl.textContent = "-"
        engineBestMoveEl.textContent = "-"
        engineDepthEl.textContent = "-"

        // Remove arrows
        ground.set({
          drawable: { autoShapes: [] }
        })

        await fetch('/api/engine/stop', { method: 'POST' })
      }
    })

    const flipBtn = document.getElementById("flip-board-btn");
    let clocksFlipped = false;
    // Function to flip the clocks when the board orientation is flipped
    function flipClocks() {
      const boardRow = document.querySelector('.board-row');
      const whiteClock = document.getElementById('clock-white').closest('.clock');
      const blackClock = document.getElementById('clock-black').closest('.clock');

      if (clocksFlipped) {
        boardRow.before(blackClock);
        boardRow.after(whiteClock);
      } else {
        boardRow.before(whiteClock);
        boardRow.after(blackClock);
      }

      clocksFlipped = !clocksFlipped;
    }
    // Handler for flipping the board orientation
    flipBtn.addEventListener("click", async () => {
         // Call backend flip API
        const res = await fetch('/api/board/flip', { method: 'POST' });
        const data = await res.json();

        if (!data.ok) {
          console.warn('Flip failed, no status returned');
          return;
        }

        flipClocks();
    });

    // Function to synchronize the clock state with the server
    async function syncClockState() {

      const res = await fetch('/api/clock/state');
      const data = await res.json();

      if (!data.ok || !data.state) {
        console.warn('Failed to sync clock state', data);
        return;
      } else {
        clockStatus.whiteMs = data.state.whiteMs;
        clockStatus.blackMs = data.state.blackMs;

        clockStatus.running = data.state.running;

        clockStatus.lastServerTime = data.state.serverTime;
        clockStatus.lastLocalTime = performance.now();
      }
    }

    // Function to render the clock updates on the client side
    function renderClock() {
      // If the clock is not active, skip rendering and wait for the next animation frame
      if (!clockStatus.on) {
        requestAnimationFrame(renderClock);
        return;
      }

      // Calculate elapsed time since last update and adjust the displayed clock times accordingly
      const now = performance.now();
      const elapsed = now - clockStatus.lastLocalTime;

      let white = clockStatus.whiteMs;
      let black = clockStatus.blackMs;

      if (clockStatus.running === "white") {
        white -= elapsed;
      } 
      else if (clockStatus.running === "black") {
        black -= elapsed;
      }
      // Add update animations
      whiteClockEl.parentElement.classList.remove("active","inactive");
      blackClockEl.parentElement.classList.remove("active","inactive");

      if (clockStatus.running === "white") {
        whiteClockEl.parentElement.classList.add("active");
        blackClockEl.parentElement.classList.add("inactive");
      }
      else if (clockStatus.running === "black") {
        blackClockEl.parentElement.classList.add("active");
        whiteClockEl.parentElement.classList.add("inactive");
      }

      // Add low time warning styles if either clock is below the 10 second threshold
      if (white > 0 && white < 10000) whiteClockEl.parentElement.classList.add("low-time")
      else whiteClockEl.parentElement.classList.remove("low-time")

      if (black > 0 && black < 10000) blackClockEl.parentElement.classList.add("low-time")
      else blackClockEl.parentElement.classList.remove("low-time")

      // Check for clock expiration
      if (!clockStatus.clockExpired) {
        if (white <= 0 || black <= 0) {

          clockStatus.clockExpired = true;

          // freeze board
          ground.set({
            movable: {
              color: null,
              dests: new Map()
            }
          });

          // stop server clock
          fetch('/api/clock/stop', { method: 'POST' });

          const winner = white <= 0 ? "Black" : "White";

          statusEl.textContent = `Time out — ${winner} wins!`;
        }
      }

      // Update the clock display
      updateClockDisplay(
        formatTime(white),
        formatTime(black)
      );

      requestAnimationFrame(renderClock);
    }
    // Helper function to update the clock display
    function formatTime(ms) {

      if (ms <= 0) return "0:00";

      const totalSeconds = Math.floor(ms / 1000);

      const m = Math.floor(totalSeconds / 60);
      const s = totalSeconds % 60;

      return `${m}:${s.toString().padStart(2, "0")}`;
    }
    // Helper function to update the clock display elements
    function updateClockDisplay(whiteStr, blackStr) {
      if (whiteClockEl) whiteClockEl.textContent = whiteStr;
      if (blackClockEl) blackClockEl.textContent = blackStr;
    }

    // Handler for resetting the board with options for color and clock time
    async function resetBoard({ color = 'white'} = {}) {
      try {
        // Destroy the existing board instance before creating a new one to ensure a clean slate
        if (ground) {
          lastBoardStatus = null;
          ground.destroy();
        }

        // Create a new board instance with the selected color orientation
        createBoard(boardEl, color);

        // Call backend reset API to reset the backend game state
        const res = await fetch('/api/board/reset', { method: 'POST' });
        const data = await res.json();

        if (!res.ok) {
          // Log the error response for debugging purposes
          console.log("RESET FAILED", data)
        }

        // Apply inital state status to the board and update the UI
        loadInitialState();

        // Force board orientation based on selected color
        const orientation = color === 'white' ? 'white' : color === 'black' ? 'black' : data.status.turn;
        if (ground.state.orientation !== orientation) {
          ground.set({ orientation });
        }

        // Restart engine if toggled on
        if (engineToggle.checked) {
          await fetch('/api/engine/start', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fen: data.status.fen })
          });
        }

      } catch (err) {
        console.error('Failed to reset board', err);
      }
    }

    // Handler for resetting the clock with options for color and clock time
    async function resetClock({ color = 'white', clockTime = 0 } = {}) {

      await fetch('/api/clock/stop', { method: 'POST' });

      if (clockTime > 0) {

        clockStatus.on = true;
        clockStatus.started = false;

        clockStatus.clockExpired = false;

        const res = await fetch('/api/clock/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ time: clockTime })
        });

        const data = await res.json();

        // Log the attempted reset for debugging purposes
        console.log("CLOCK RESET", { time: clockTime, response: data });

        await syncClockState();

        renderClock();

      } else {

        clockStatus.on = false;
        updateClockDisplay("--:--", "--:--");

      }
    }

    
    // Handler for starting a new game with selected options
    newGameBtn.addEventListener("click", async () => {
      const color = colorSelect.value;
      const clockTime = parseInt(clockSelect.value, 10);

      // Call the resetBoard helper
      await resetBoard({ color});

      // Reset the clock based on selected time control
      await resetClock({ color, clockTime });
    });


    loadInitialState();
    connect();

  </script>
</body>
</html>
